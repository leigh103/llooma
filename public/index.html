<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lloom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
  <div class="logo" id="logo">L</div>
  <div class="header-text">
    <h1 id="agent-name">Lloom</h1>
    <p id="agent-description">Personal Ollama agent</p>
  </div>
  <div class="status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">connecting...</span>
  </div>
</header>

<div id="messages">
  <div id="empty-state">
    <div class="big-m" id="empty-letter">L</div>
    <p id="empty-text">Ask me anything</p>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" placeholder="Ask something..." rows="1"></textarea>
    <button id="send-btn" onclick="sendFromInput()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="footer-meta">Enter to send · Shift+Enter for new line</div>
</footer>

<script>
  const API_KEY = ''; // Set your API key here, or leave blank if none
  const API_BASE = window.location.origin + '/api';

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const emptyState = document.getElementById('empty-state');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');

  let agentName = 'Lloom';
  let history = [];
  let isStreaming = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendFromInput();
    }
  });

  function sendFromInput() {
    const msg = inputEl.value.trim();
    if (msg) send(msg);
  }

  // Check health on load and populate agent identity
  async function checkHealth() {
    try {
      const res = await fetch(`${API_BASE}/health`);
      if (res.ok) {
        const data = await res.json();
        agentName = data.name || 'Lloom';
        const description = data.description || 'Personal Ollama agent';
        const initial = agentName.charAt(0).toUpperCase();

        document.title = agentName;
        document.getElementById('logo').textContent = initial;
        document.getElementById('agent-name').textContent = agentName;
        document.getElementById('agent-description').textContent = description;
        document.getElementById('empty-letter').textContent = initial;
        document.getElementById('empty-text').textContent = `Ask ${agentName} anything`;
        inputEl.placeholder = `Ask ${agentName} something...`;

        statusDot.classList.remove('offline');
        statusText.textContent = 'online';
      } else throw new Error();
    } catch {
      statusDot.classList.add('offline');
      statusText.textContent = 'offline';
    }
  }

  checkHealth();

  // Simple markdown renderer
  function renderMarkdown(text) {
    return text
      .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code class="lang-${lang}">${escapeHtml(code.trim())}</code></pre>`)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^\* (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/^(?!<[hupbla])(.+)$/gm, m => m ? `<p>${m}</p>` : '')
      .replace(/<p><\/p>/g, '');
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addMessage(role, content = '') {
    if (emptyState.style.display !== 'none') {
      emptyState.style.display = 'none';
    }

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'user' ? 'You' : agentName;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'assistant' && !content) {
      bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    } else {
      bubble.innerHTML = role === 'assistant' ? renderMarkdown(content) : escapeHtml(content);
    }

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    return bubble;
  }

  async function send(message) {
    if (isStreaming || !message.trim()) return;
    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', message);
    const bubble = addMessage('assistant'); // typing indicator

    try {
      const headers = { 'Content-Type': 'application/json' };
      if (API_KEY) headers['x-api-key'] = API_KEY;

      const res = await fetch(`${API_BASE}/chat/stream`, {
        method: 'POST',
        headers,
        body: JSON.stringify({ message, history }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullReply = '';
      bubble.innerHTML = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

        for (const line of lines) {
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const { token, tool, error } = JSON.parse(data);
            if (error) throw new Error(error);
            if (tool) {
              // Show tool call status inside the bubble
              let statusEl = bubble.querySelector('.tool-status');
              if (!statusEl) {
                bubble.innerHTML = '';
                statusEl = document.createElement('div');
                statusEl.className = 'tool-status';
                bubble.appendChild(statusEl);
              }
              const line = document.createElement('div');
              line.className = 'tool-status-line';
              line.textContent = tool;
              statusEl.appendChild(line);
            }
            if (token) {
              // First token — clear tool status and start rendering
              if (bubble.querySelector('.tool-status')) bubble.innerHTML = '';
              fullReply += token;
              bubble.innerHTML = renderMarkdown(fullReply);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch {}
        }
      }

      history.push({ role: 'user', content: message });
      history.push({ role: 'assistant', content: fullReply });

      // Keep history manageable
      if (history.length > 20) history = history.slice(-20);

    } catch (err) {
      bubble.innerHTML = `<em style="color:var(--red)">Error: ${err.message}</em>`;
    }

    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>

</body>
</html>
